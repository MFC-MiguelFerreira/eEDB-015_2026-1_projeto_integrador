AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Stack 05 — Glue Job Bronze → Silver — eEDB-015.
  Provisiona o job de transformação Bronze → Silver usando AWS Glue 5.0.
  DEPENDÊNCIAS: stacks 01-storage, 03-glue-catalog e 04-glue-bronze devem estar implantados.

# ---------------------------------------------------------------------------
# Parâmetros
# ---------------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: eedb015
    AllowedPattern: "[a-z0-9-]+"
    Description: Mesmo valor usado nos stacks anteriores.

  Group:
    Type: String
    Default: g05
    AllowedPattern: "[a-z0-9]+"
    Description: Mesmo valor usado nos stacks anteriores.

  GlueJobScriptsBucket:
    Type: String
    Description: >
      Nome do bucket S3 onde os scripts Glue foram carregados
      pelo deploy_glue_jobs.sh (tipicamente o bucket Landing Zone).

# ---------------------------------------------------------------------------
# Recursos
# ---------------------------------------------------------------------------
Resources:

  # ---------- Glue Job: Bronze → Silver --------------------------------------
  # Lê tabelas Iceberg da Bronze → aplica tipagem/limpeza → recria na Silver.
  # Usa LabRole (obrigatório no AWS Academy — não é possível criar roles).
  GlueJobBronzeToSilver:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub "${ProjectName}-bronze-to-silver"
      Description: >
        Transformação Bronze → Silver: Iceberg → Iceberg com tipagem,
        limpeza e regras de negócio iniciais.
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      GlueVersion: "5.0"
      WorkerType: G.1X
      NumberOfWorkers: 2
      Timeout: 120
      MaxRetries: 0
      Command:
        Name: glueetl
        PythonVersion: "3"
        ScriptLocation: !Sub "s3://${GlueJobScriptsBucket}/glue-scripts/bronze_to_silver.py"
      DefaultArguments:
        "--job-language": "python"
        "--job-bookmark-option": "job-bookmark-disable"
        "--datalake-formats": "iceberg"
        "--enable-glue-datacatalog": "true"
        "--enable-continuous-cloudwatch-log": "true"
        "--enable-metrics": "true"
        "--PIPELINE_NAME": "health_insurance"
        "--BRONZE_DATABASE": !ImportValue
          Fn::Sub: "${ProjectName}-${Group}-bronze-database-name"
        "--SILVER_DATABASE": !ImportValue
          Fn::Sub: "${ProjectName}-${Group}-silver-database-name"
      Tags:
        Project: !Ref ProjectName
        Group: !Ref Group
        ManagedBy: CloudFormation

  # ---------- CloudWatch Log Group -------------------------------------------
  # Retém logs do job Bronze → Silver por 7 dias para economizar crédito.
  GlueJobBronzeToSilverLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws-glue/jobs/${ProjectName}-bronze-to-silver"
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Group
          Value: !Ref Group
        - Key: ManagedBy
          Value: CloudFormation

# ---------------------------------------------------------------------------
# Outputs — exportados para stack de orquestração (Step Functions)
# ---------------------------------------------------------------------------
Outputs:
  BronzeToSilverGlueJobName:
    Description: Nome do Glue Job Bronze → Silver
    Value: !Ref GlueJobBronzeToSilver
    Export:
      Name: !Sub "${ProjectName}-${Group}-bronze-to-silver-job-name"
